name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check repository layout
        shell: bash
        run: |
          test -f README.md
          test -f LICENSE.md
          test -f R/scpi/DESCRIPTION
          test -f Python/scpi_pkg/pyproject.toml
          test -f Python/scpi_pkg/setup.cfg
          test -f stata/stata.toc
          test -f stata/scpi.pkg
          grep -qx 'p scpi' stata/stata.toc
          awk '$1 == "f" {print $2}' stata/scpi.pkg | while read -r file; do
            test -f "stata/${file}"
          done

  python-build:
    name: Python build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Install Python package
        run: python -m pip install -e Python/scpi_pkg

      - name: Check Python package import
        run: |
          python -m compileall -q Python/scpi_pkg/src/scpi_pkg
          python -c "import scpi_pkg; print('scpi_pkg import OK')"

      - name: Build Python package
        run: python -m build Python/scpi_pkg

  r-check:
    name: R CMD check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R dependencies
        run: |
          repos <- c(RSPM = Sys.getenv("RSPM"), CRAN = "https://cloud.r-project.org")
          install.packages(
            c(
              "abind",
              "CVXR",
              "doSNOW",
              "dplyr",
              "ECOSolveR",
              "fastDummies",
              "foreach",
              "ggplot2",
              "magrittr",
              "MASS",
              "Matrix",
              "purrr",
              "Qtools",
              "reshape2",
              "Rdpack",
              "rlang",
              "stringr",
              "tibble",
              "tidyr",
              "testthat"
            ),
            repos = repos
          )
        shell: Rscript {0}

      - name: Build R source package
        run: R CMD build R/scpi

      - name: Check R package
        run: R CMD check scpi_*.tar.gz --no-manual
